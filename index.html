<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta charset="utf-8">
<title>My Black Window</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Сеть -->
<div id="btnNetwork" title="Статус подключения (можно перетаскивать)">
  <span id="networkIconContainer"></span>
</div>

<!-- Крестик -->
<div id="btnClose" title="Закрыть">
  <svg viewBox="0 0 14 14"><path d="M14 1.41L12.59 0L7 5.59L1.41 0L0 1.41L5.59 7L0 12.59L1.41 14L7 8.41L12.59 14L14 12.59L8.41 7L14 1.41Z" fill="#D9D9D9"/></svg>
</div>

<!-- Редактируемая надпись -->
<div class="brand-footer" id="editableBrand">ТенеТ Т8 Вместе к новым свершениям ТенеТ Т8</div>

<!-- Модальное окно редактирования -->
<div class="modal-overlay" id="brandEditorModal">
  <div class="modal-content">
    <h3>Редактировать надпись</h3>
    <input type="text" id="brandTextInput" maxlength="50" value="ТенеТ Т8 Вместе к новым свершениям ТенеТ Т8">
    <div class="modal-buttons">
      <button class="modal-btn cancel" id="cancelBrandEdit">Отмена</button>
      <button class="modal-btn save" id="saveBrandEdit">Сохранить</button>
    </div>
  </div>
</div>

<!-- Шторка обоев -->
<div id="sidebar" class="sidebar">
  <button id="closeSidebar" class="close-btn"><span style="font-size:24px;color:red;">&#10008;</span></button>
  <h3>Выберите фотообои</h3>
  <div class="wallpaper-grid">
    <div class="wallpaper-item" data-src="images/Bg.jpg"><img src="images/Bg.jpg" alt=""></div>
    <div class="wallpaper-item" data-src="images/Bg-1.jpg"><img src="images/Bg-1.jpg" alt=""></div>
    <div class="wallpaper-item" data-src="images/Bg-3.jpg"><img src="images/Bg-3.jpg" alt=""></div>
    <div class="wallpaper-item" data-src="images/Bg-4.jpg"><img src="images/Bg-4.jpg" alt=""></div>
    <div class="wallpaper-item" data-src="images/Bg-5.jpg"><img src="images/Bg-5.jpg" alt=""></div>
    <div class="wallpaper-item" data-src="images/Bg-6.jpg"><img src="images/Bg-6.jpg" alt=""></div>
    <div class="wallpaper-item" data-src="images/Bg-7.jpg"><img src="images/Bg-7.jpg" alt=""></div>
    <div class="wallpaper-item" data-src="images/Bg-8.jpg"><img src="images/Bg-8.jpg" alt=""></div>
    <div class="wallpaper-item" data-src="images/Bg-9.jpg"><img src="images/Bg-9.jpg" alt=""></div>
    <div class="wallpaper-item" data-src="images/Bg-10.jpg"><img src="images/Bg-10.jpg" alt=""></div>
    <div class="wallpaper-item" data-src="images/Bg-11.jpg"><img src="images/Bg-11.jpg" alt=""></div>
    <div class="wallpaper-item" data-src="images/Bg-12.jpg"><img src="images/Bg-12.jpg" alt=""></div>
    <div class="wallpaper-item" data-src="images/Bg-13.jpg"><img src="images/Bg-13.jpg" alt=""></div>
    <div class="wallpaper-item" data-src="images/Bg-14.jpg"><img src="images/Bg-14.jpg" alt=""></div>
  </div>
  <div class="custom-wallpaper-section">
    <div class="custom-wallpaper-btn" id="presetVideoKamin">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M4 6h16v12H4zM10 9l5 3-5 3V9z"/>
      </svg>
      Камин HD
    </div>
  </div>
</div>

<!-- Основная панель -->
<div class="dashboard">
  <!-- Климат -->
  <div class="widget_climate widget">
    <div class="climate-grid">
      <div class="climate_slot" data-climate-slot="1"></div>
      <div class="climate_slot" data-climate-slot="2"></div>
      <div class="climate_slot" data-climate-slot="3"></div>
      <div class="climate_slot" data-climate-slot="4"></div>
    </div>
    <div class="climate-off-all" id="climateOffAll" title="Выключить всё">
      <svg viewBox="0 0 14 14"><path d="M14 1.41L12.59 0L7 5.59L1.41 0L0 1.41L5.59 7L0 12.59L1.41 14L7 8.41L12.59 14L14 12.59L8.41 7L14 1.41Z" fill="#D9D9D9"/></svg>
    </div>
  </div>

  <!-- Время -->
  <div class="widget_time widget">
    <div class="flip-clock" id="flipClock"></div>
    <div class="widget_time__date" id="dateDisplay"></div>
    <div class="widget_time__weekday" id="weekdayDisplay"></div>
  </div>

  <!-- Плеер -->
  <div class="widget_player widget">
    <div class="widget_player__image"><img src="images/img.jpg" alt=""></div>
    <div class="widget_player__right">
      <div class="widget_player__top">
        <div class="widget_player__titles">
          <div class="widget_player__title">Название песни</div>
          <div class="widget_player__artist">Имя артиста</div>
        </div>
      </div>
      <div class="widget_player__track_row">
        <div class="widget_player__track_line">
          <div class="widget_player__track_progress" style="width:0%"><div class="widget_player__track_dot"></div></div>
        </div>
        <div class="widget_player__track_time"><span>00:00</span> / <span>00:00</span></div>
      </div>
      <div class="widget_player__buttons">
        <div id="player__prev" class="widget_player__prev"><svg viewBox="0 0 16 16"><path d="M0 0h2.7v16H0zm4.7 8L16 16V0z" fill="#D9D9D9"/></svg></div>
        <div id="player__play" class="widget_player__play"><svg viewBox="0 0 15 19"><path d="M0 0v18.1L14.2 9 0 0z" fill="#D9D9D9"/></svg></div>
        <div id="player__pause" class="widget_player__play" style="display:none"><svg viewBox="0 0 10 18"><rect width="3" height="18" fill="#D9D9D9"/><rect x="7" width="3" height="18" fill="#D9D9D9"/></svg></div>
        <div id="player__next" class="widget_player__next"><svg viewBox="0 0 16 16"><path d="M0 16L11.3 8 0 0zm13.3 0V0H16v16z" fill="#D9D9D9"/></svg></div>
      </div>
    </div>
  </div>

  <!-- Приложения -->
  <div class="widget_apps widget">
    <div class="app_slot" data-slot="1"></div>
    <div class="app_slot" data-slot="2"></div>
    <div class="app_slot" data-slot="3"></div>
    <div class="app_slot" data-slot="4"></div>
  </div>

  <!-- Боковые кнопки -->
  <div class="right-buttons">
    <div id="btnWallpaper" class="widget_buttons">
      <img src="images/Auto.jpg" alt="Автообои" style="width:100%; height:100%; object-fit:cover; border-radius: 1.2rem;">
    </div>
    <div id="openSidebar" class="widget_buttons" style="padding:0; overflow:hidden;">
      <img src="images/static.jpg" alt="Статичные обои" style="width:100%; height:100%; object-fit:cover;">
    </div>
    <div id="btnSettings" class="widget_buttons">
      <img src="images/setting.jpg" alt="Настройки" style="width:100%; height:100%; object-fit:cover; border-radius: 1.2rem;">
    </div>
  </div>
</div>

<!-- Шторка климата -->
<div id="climate-picker" class="picker-drawer">
  <div class="drawer-header"><span class="drawer-title">Выберите функцию</span><button class="drawer-close" id="climate-picker-close">✕</button></div>
  <div id="climate-picker-grid" class="picker-grid"></div>
</div>

<!-- Пикер приложений -->
<div id="app_picker" class="picker-drawer">
  <div class="drawer-header"><span class="drawer-title">Выберите приложение</span><button class="drawer-close" id="app-picker-close">✕</button></div>
  <div id="app-picker-grid" class="picker-grid"></div>
</div>

<!-- Индикатор загрузки (глобальный) -->
<div id="global-loader" class="global-loader hidden">
  <div class="spinner"></div>
</div>

<!-- Видеофон -->
<video id="video-background" muted loop playsinline></video>

<script src="app.js"></script>
</body>
</html>
